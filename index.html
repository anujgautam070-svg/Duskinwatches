<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUSKIN WATCHES</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        
        /* Logo Size Bada Kar Diya */
        .logo-section { padding: 40px; }
        .logo-section img { width: 400px; max-width: 95%; height: auto; }
        
        .section-title { color: #d4af37; margin: 40px 0 20px; text-transform: uppercase; }
        
        /* Grid setup - pictures balanced dikhengi */
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 10px; width: 220px; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
        
        .whatsapp-btn { display: inline-block; margin: 30px; padding: 15px 30px; background: #25D366; color: #fff; text-decoration: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="logo-section">
        <img src="image_08.png" alt="Duskin Logo">
    </div>

    <a href="https://wa.me/YOUR_PHONE_NUMBER" class="whatsapp-btn">Chat on WhatsApp</a>

    <h2 class="section-title">Our Collection</h2>
    <div class="grid">
        <div class="card"><img src="image_10.png" alt="Royal Gold"><h3>Royal Gold</h3></div>
        <div class="card"><img src="image_09.png" alt="Silver"><h3>Silver</h3></div>
        <div class="card"><img src="image_11.png" alt="Brown"><h3>Brown</h3></div>
        <div class="card"><img src="watch1.png" alt="Watch 1"><h3>Classic Model</h3></div>
        <div class="card"><img src="watch2.png" alt="Watch 2"><h3>Legacy Model</h3></div>
    </div>

</body>
</html>
