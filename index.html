<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUSKIN WATCHES | Official</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        
        /* Bada Logo */
        .logo-section { padding: 50px; }
        .logo-section img { width: 300px; max-width: 90%; }
        
        .section-title { color: #d4af37; margin: 40px 0 20px; text-transform: uppercase; }
        
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; width: 280px; }
        .card img { width: 100%; border-radius: 8px; }
        .card h3 { margin: 15px 0 5px; color: #fff; }
        
        /* WhatsApp Button */
        .whatsapp-btn { 
            display: inline-block; margin: 30px; padding: 15px 30px; 
            background: #25D366; color: #fff; text-decoration: none; 
            border-radius: 50px; font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="logo-section">
        <img src="image_8.png" alt="Duskin Logo">
    </div>

    <!-- WhatsApp Button -->
    <a href="https://wa.me/YOUR_PHONE_NUMBER" class="whatsapp-btn">Chat on WhatsApp</a>

    <h2 class="section-title">Our Collection</h2>
    <div class="grid">
        <!-- New Arrivals -->
        <div class="card">
            <img src="image_10.png" alt="Royal Gold">
            <h3>Royal Gold</h3>
        </div>
        
        <!-- Classic Models -->
        <div class="card">
            <img src="image_9.png" alt="Classic Silver">
            <h3>Classic Silver</h3>
        </div>
        <div class="card">
            <img src="image_11.png" alt="Brown Leather">
            <h3>Timeless Brown</h3>
        </div>
    </div>

</body>
</html>
