        /* Base & Luxury Theme Setup */

        header {

            align-items: center;
            position: fixed;
            width: 100%;

            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        .logo {
            font-family: 'Playfair Display', serif;

            text-transform: uppercase;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #D4AF37;
        }

            margin-bottom: 15px;

            color: #cccccc;
        }
        .btn-gold {

            color: #D4AF37;
            padding: 15px 40px;
            border: 1px solid #D4AF37;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            cursor: pointer;
            display: inline-block;
        }
        .btn-gold:hover {
            background: #D4AF37;
            color: #050505;
        }

        /* Collections Section */

        }

            margin-bottom: 50px;
            letter-spacing: 2px;
        }
        .watch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Category Card Setup */
        .category-card {
            background: #0f0f0f;

            padding: 40px 20px;
            transition: transform 0.4s ease, border-color 0.4s ease;
            text-align: center;
            border-radius: 10px;
        }
        .category-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .category-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffffff;
            letter-spacing: 1px;
        }
        .category-card p {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .btn-small {
            background: transparent;
            color: #cccccc;
            padding: 10px 25px;
            border: 1px solid #555;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-small:hover {
            background: #D4AF37;
            color: #000;
            border-color: #D4AF37;
        }

        /* Hidden Watches Container */
        .hidden-watches {
            display: none; 
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .watch-img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .price-tag {
            color: #D4AF37;
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

            letter-spacing: 2px;
        }
